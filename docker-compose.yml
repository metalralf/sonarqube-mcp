version: "3.8"
services:
  sonarqube-mcp:
    build: .
    ports:
      - "${HOST_PORT:-8080}:8080"
    environment:
      - SONARQUBE_URL=${SONARQUBE_URL}
      - SONARQUBE_TOKEN=${SONARQUBE_TOKEN}
      - SONARQUBE_PROJECT=${SONARQUBE_PROJECT:-}
      - SONARQUBE_HTTP_PORT=8080
      - SONARQUBE_TRANSPORT=http
      - SONARQUBE_READ_ONLY=${SONARQUBE_READ_ONLY:-false}
      - SONARQUBE_HTTP_ALLOWED_ORIGINS=${SONARQUBE_HTTP_ALLOWED_ORIGINS:-}
      - SONARQUBE_LOG_LEVEL=${SONARQUBE_LOG_LEVEL:-info}
    restart: unless-stopped
